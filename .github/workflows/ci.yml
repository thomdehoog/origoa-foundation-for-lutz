name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: go vet ./...
      - run: node --check internal/httpapi/web/app.js
      - run: go test -race ./...
