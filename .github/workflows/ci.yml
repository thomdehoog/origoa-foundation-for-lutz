name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || { echo "$files"; exit 1; }

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -shuffle=on ./...

      - name: Stress concurrent paths
        run: go test -race -cpu=1,4 -count=2 -run 'Test(Concurrent|ReadersNever|CachedResults|WriteLock)' ./internal/repository

      - name: Fuzz repository boundaries
        run: |
          go test -run '^$' -fuzz '^FuzzSafeFolder$' -fuzztime=10s ./internal/repository
          go test -run '^$' -fuzz '^FuzzStrictArtifactDecoder$' -fuzztime=10s ./internal/repository
          go test -run '^$' -fuzz '^FuzzApplyPatch$' -fuzztime=10s ./internal/repository

      - name: Fuzz HTTP boundaries
        run: |
          go test -run '^$' -fuzz '^FuzzExpectedETag$' -fuzztime=10s ./internal/httpapi
          go test -run '^$' -fuzz '^FuzzRequestDecoder$' -fuzztime=10s ./internal/httpapi

      - name: Check browser JavaScript
        run: node --check internal/httpapi/web/app.js

      - name: Build production binary
        run: go build -trimpath -ldflags='-s -w' -o /tmp/origoa ./cmd/origoa

      - name: Build container
        run: docker build --tag origoa:ci .
